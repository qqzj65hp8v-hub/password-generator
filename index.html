<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 480px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .result-box {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            position: relative;
        }
        .password-display {
            font-family: 'Courier New', monospace;
            font-size: 20px;
            word-break: break-all;
            color: #333;
            min-height: 28px;
        }
        .copy-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .copy-btn:hover {
            background: #5568d3;
        }
        .copy-btn:active {
            transform: translateY(-50%) scale(0.95);
        }
        .strength-bar {
            height: 6px;
            border-radius: 3px;
            margin-top: 12px;
            transition: all 0.3s;
            background: #e9ecef;
        }
        .strength-bar.weak {
            background: #dc3545;
            width: 33%;
        }
        .strength-bar.medium {
            background: #ffc107;
            width: 66%;
        }
        .strength-bar.strong {
            background: #28a745;
            width: 100%;
        }
        .strength-text {
            text-align: right;
            font-size: 12px;
            margin-top: 6px;
            color: #666;
        }
        .option-group {
            margin-bottom: 20px;
        }
        .option-label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 15px;
            font-weight: 500;
        }
        .length-control {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: #e9ecef;
            border-radius: 3px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(102, 126, 234, 0.4);
        }
        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 6px rgba(102, 126, 234, 0.4);
        }
        .length-value {
            font-size: 18px;
            font-weight: 600;
            color: #667eea;
            min-width: 32px;
            text-align: center;
        }
        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .checkbox-item:hover {
            background: #f8f9fa;
        }
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #667eea;
            cursor: pointer;
        }
        .checkbox-item span {
            font-size: 14px;
            color: #555;
        }
        .generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        .generate-btn:active {
            transform: translateY(0);
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .error-msg {
            color: #dc3545;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        @media (max-width: 480px) {
            .container {
                padding: 24px;
            }
            h1 {
                font-size: 24px;
            }
            .password-display {
                font-size: 16px;
            }
            .checkbox-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 密码生成器</h1>
        
        <div class="result-box">
            <div class="password-display" id="passwordDisplay">点击生成密码</div>
            <button class="copy-btn" id="copyBtn">复制</button>
            <div class="strength-bar" id="strengthBar"></div>
            <div class="strength-text" id="strengthText"></div>
        </div>

        <div class="option-group">
            <label class="option-label">密码长度</label>
            <div class="length-control">
                <input type="range" id="lengthSlider" min="4" max="64" value="16">
                <span class="length-value" id="lengthValue">16</span>
            </div>
        </div>

        <div class="option-group">
            <label class="option-label">包含字符</label>
            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" id="uppercase" checked>
                    <span>大写字母 (A-Z)</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="lowercase" checked>
                    <span>小写字母 (a-z)</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="numbers" checked>
                    <span>数字 (0-9)</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="symbols">
                    <span>特殊符号 (!@#$)</span>
                </label>
            </div>
            <div class="error-msg" id="errorMsg">至少选择一种字符类型</div>
        </div>

        <button class="generate-btn" id="generateBtn">生成密码</button>
    </div>

    <div class="toast" id="toast">已复制到剪贴板</div>

    <script>
        const passwordDisplay = document.getElementById('passwordDisplay');
        const copyBtn = document.getElementById('copyBtn');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');
        const lengthSlider = document.getElementById('lengthSlider');
        const lengthValue = document.getElementById('lengthValue');
        const uppercase = document.getElementById('uppercase');
        const lowercase = document.getElementById('lowercase');
        const numbers = document.getElementById('numbers');
        const symbols = document.getElementById('symbols');
        const generateBtn = document.getElementById('generateBtn');
        const toast = document.getElementById('toast');
        const errorMsg = document.getElementById('errorMsg');

        const CHAR_SETS = {
            uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lowercase: 'abcdefghijklmnopqrstuvwxyz',
            numbers: '0123456789',
            symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
        };

        lengthSlider.addEventListener('input', () => {
            lengthValue.textContent = lengthSlider.value;
        });

        function getSelectedChars() {
            let chars = '';
            if (uppercase.checked) chars += CHAR_SETS.uppercase;
            if (lowercase.checked) chars += CHAR_SETS.lowercase;
            if (numbers.checked) chars += CHAR_SETS.numbers;
            if (symbols.checked) chars += CHAR_SETS.symbols;
            return chars;
        }

        function generatePassword() {
            const chars = getSelectedChars();
            if (!chars) {
                errorMsg.classList.add('show');
                return null;
            }
            errorMsg.classList.remove('show');

            const length = parseInt(lengthSlider.value);
            const array = new Uint32Array(length);
            crypto.getRandomValues(array);

            let password = '';
            for (let i = 0; i < length; i++) {
                password += chars[array[i] % chars.length];
            }
            return password;
        }

        function evaluateStrength(password) {
            if (!password) return { level: '', text: '' };
            
            let score = 0;
            if (password.length >= 8) score++;
            if (password.length >= 12) score++;
            if (password.length >= 16) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[a-z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;

            if (score <= 3) return { level: 'weak', text: '强度: 弱' };
            if (score <= 5) return { level: 'medium', text: '强度: 中' };
            return { level: 'strong', text: '强度: 强' };
        }

        function updateStrength(password) {
            const strength = evaluateStrength(password);
            strengthBar.className = 'strength-bar' + (strength.level ? ' ' + strength.level : '');
            strengthText.textContent = strength.text;
        }

        generateBtn.addEventListener('click', () => {
            const password = generatePassword();
            if (password) {
                passwordDisplay.textContent = password;
                updateStrength(password);
            }
        });

        copyBtn.addEventListener('click', async () => {
            const text = passwordDisplay.textContent;
            if (!text || text === '点击生成密码') return;
            
            try {
                await navigator.clipboard.writeText(text);
                showToast('已复制到剪贴板');
            } catch (err) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('已复制到剪贴板');
            }
        });

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 初始生成一个密码
        const initialPassword = generatePassword();
        if (initialPassword) {
            passwordDisplay.textContent = initialPassword;
            updateStrength(initialPassword);
        }
    </script>
</body>
</html>
